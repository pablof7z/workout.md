name: WorkoutMD
options:
  bundleIdPrefix: com.workoutmd
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
targets:
  WorkoutMD:
    type: application
    platform: iOS
    sources:
      - path: Sources
    preBuildScripts:
      - name: Build Rust core (workout-core)
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail

          REPO_ROOT="${SRCROOT}/.."
          CORE_DIR="${REPO_ROOT}/core/workout-core"
          CARGO_BIN="${CARGO:-$HOME/.cargo/bin/cargo}"
          LIB_NAME="libworkout_core.a"
          OUT_DIR="${SRCROOT}/Build/Rust/${SDK_NAME}"
          GENERATED_DIR="${SRCROOT}/Sources/Bridge/Generated"

          # `cargo`'s own `cargo metadata` (invoked internally by the
          # `uniffi-bindgen` binary below) resolves the manifest from the
          # current directory, not from `--manifest-path`, so this whole
          # script runs with its cwd inside the crate.
          cd "$CORE_DIR"

          if [[ "${CONFIGURATION:-Debug}" == "Release" ]]; then
            CARGO_PROFILE_FLAG="--release"
            CARGO_PROFILE_DIR="release"
          else
            CARGO_PROFILE_FLAG=""
            CARGO_PROFILE_DIR="debug"
          fi

          mkdir -p "$OUT_DIR"

          build_target() {
            local target="$1"
            "$CARGO_BIN" build $CARGO_PROFILE_FLAG --target "$target"
          }

          if [[ "$SDK_NAME" == iphoneos* ]]; then
            build_target "aarch64-apple-ios"
            cp "${CORE_DIR}/target/aarch64-apple-ios/${CARGO_PROFILE_DIR}/${LIB_NAME}" "${OUT_DIR}/${LIB_NAME}"
          else
            declare -a libs=()
            for arch in ${ARCHS:-arm64}; do
              case "$arch" in
                arm64)
                  target="aarch64-apple-ios-sim"
                  ;;
                x86_64)
                  target="x86_64-apple-ios"
                  ;;
                *)
                  echo "Unsupported simulator arch: $arch" >&2
                  exit 1
                  ;;
              esac
              build_target "$target"
              libs+=("${CORE_DIR}/target/${target}/${CARGO_PROFILE_DIR}/${LIB_NAME}")
            done

            if [[ "${#libs[@]}" -eq 1 ]]; then
              cp "${libs[0]}" "${OUT_DIR}/${LIB_NAME}"
            else
              lipo -create "${libs[@]}" -output "${OUT_DIR}/${LIB_NAME}"
            fi
          fi

          # Regenerate the UniFFI Swift bindings from a host-built cdylib.
          # The interface is target-independent, so a macOS host build is
          # sufficient to introspect it even though the .a linked above is
          # built for the iOS device/simulator target. This crate carries its
          # own `uniffi-bindgen` binary (gated behind the `bindgen` feature)
          # so the generator always matches this crate's `uniffi` version —
          # a globally installed `uniffi-bindgen` is not guaranteed to.
          "$CARGO_BIN" build
          HOST_LIB="${CORE_DIR}/target/debug/libworkout_core.dylib"

          mkdir -p "$GENERATED_DIR"
          "$CARGO_BIN" run --features bindgen --bin uniffi-bindgen -- \
            generate --library --crate workout_core --language swift \
            --out-dir "$GENERATED_DIR" --no-format "$HOST_LIB"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.workoutmd.prototype
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_CFBundleDisplayName: "Workout.md"
        INFOPLIST_KEY_UILaunchStoryboardName: "LaunchScreen"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UIStatusBarStyle: "UIStatusBarStyleLightContent"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 456SHKPP26
        CODE_SIGN_ENTITLEMENTS: WorkoutMD.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Bridge/WorkoutCore.h
        "LIBRARY_SEARCH_PATHS[sdk=iphoneos*]": "$(inherited) $(SRCROOT)/Build/Rust/$(SDK_NAME)"
        "LIBRARY_SEARCH_PATHS[sdk=iphonesimulator*]": "$(inherited) $(SRCROOT)/Build/Rust/$(SDK_NAME)"
        # The coach engine (rig.rs + reqwest + rustls) pulls in system
        # frameworks the plain proof-of-pipeline core didn't need:
        #   - Security: rustls-platform-verifier verifies TLS certs through
        #     the OS trust store (SecTrust*) instead of a bundled root CA
        #     list.
        #   - CoreFoundation/SystemConfiguration: transitive requirements of
        #     Security-based cert verification and of `getifaddrs`-based
        #     reachability code paths used lower in the network stack.
        #   - libz/libiconv: transitive requirements of libcurl-adjacent
        #     HTTP/2 (h2)/compression and ICU (via url/idna) crates.
        OTHER_LDFLAGS: "$(inherited) -lworkout_core -framework Security -framework CoreFoundation -framework SystemConfiguration -lz -liconv"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    scheme:
      testTargets:
        - WorkoutMDTests
  # Logic-only unit tests. No host app on purpose: it compiles `ThinkStripper.swift` directly
  # (a pure, Foundation-only helper) rather than depending on the full `WorkoutMD` app target, so
  # running tests doesn't require the Rust-core prebuild/cross-compile step.
  WorkoutMDTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/WorkoutMDTests
      - path: Sources/Coach/ThinkStripper.swift
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 456SHKPP26
